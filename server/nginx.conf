# /etc/nginx/sites-available/api.ketanwani.me
# After placing this file, run:
#   sudo ln -s /etc/nginx/sites-available/api.ketanwani.me /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d api.ketanwani.me
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name api.ketanwani.me;

    location / {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Required for SSE streaming
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
        chunked_transfer_encoding on;
    }
}
