services:
  chat-api:
    build: ./server
    expose:
      - "3002"
    environment:
      - PORT=3002
      - CALENDLY_API_TOKEN=${CALENDLY_API_TOKEN}
      - CALENDLY_EVENT_SLUG=${CALENDLY_EVENT_SLUG:-30min}
    env_file:
      - ./server/.env
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./server/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - chat-api
    restart: unless-stopped
